<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sim Database | Nawab Zada Hacker</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary-color: #00d2ff; --secondary-color: #3a7bd5; --glass: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(to right, #24243e, #302b63, #0f0c29); color: white; margin: 0; padding: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        
        /* LOCK SCREEN */
        #lock-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 12, 41, 0.98); z-index: 10000; display: flex; justify-content: center; align-items: center; flex-direction: column; text-align: center; backdrop-filter: blur(15px); }
        .lock-box { padding: 40px; background: var(--glass); border: 2px solid var(--primary-color); border-radius: 20px; box-shadow: 0 0 30px rgba(0, 210, 255, 0.3); max-width: 400px; width: 90%; }
        .lock-box i { font-size: 60px; color: #ff4b2b; margin-bottom: 20px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .follow-btn { background: #25D366; color: white; border: none; padding: 15px 25px; font-size: 18px; font-weight: bold; border-radius: 50px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; transition: 0.3s; margin-top: 20px; text-decoration: none; }
        #timer-text { margin-top: 15px; font-size: 14px; color: #aaa; display: none; }

        /* HEADER */
        .banner { width: 100%; padding: 40px 0; text-align: center; background: rgba(0, 0, 0, 0.3); border-bottom: 2px solid var(--primary-color); margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .banner h1 { font-size: 3rem; margin: 0; letter-spacing: 5px; text-transform: uppercase; background: linear-gradient(to right, #00d2ff, #91eae4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .container { width: 90%; max-width: 1200px; flex-grow: 1; }
        .db-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 50px; }
        .db-card { background: var(--glass); backdrop-filter: blur(10px); padding: 40px; border-radius: 20px; text-align: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); transition: 0.4s; }
        .db-card:hover { transform: translateY(-10px); border-color: var(--primary-color); box-shadow: 0 0 20px var(--primary-color); }
        .db-card i { font-size: 50px; color: var(--primary-color); margin-bottom: 20px; }

        .search-section { display: none; background: var(--glass); padding: 30px; border-radius: 20px; margin-top: 20px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 15px; border-radius: 10px; border: none; outline: none; font-size: 16px; }
        .search-btn { padding: 15px 30px; border-radius: 10px; border: none; background: var(--secondary-color); color: white; font-weight: bold; cursor: pointer; }
        .back-btn { background: #ff4b2b; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-bottom: 15px; }

        /* RESULT AREA */
        .result-area { margin-top: 20px; background: rgba(0,0,0,0.6); padding: 20px; border-radius: 15px; display: none; border: 1px solid var(--primary-color); }
        .data-item { border-bottom: 1px solid rgba(255,255,255,0.1); padding: 12px 0; display: flex; justify-content: space-between; font-size: 15px; }
        .data-label { color: var(--primary-color); font-weight: bold; text-transform: uppercase; }
        
        #map-container { margin-top: 20px; height: 350px; width: 100%; border-radius: 15px; overflow: hidden; border: 2px solid var(--primary-color); display: none; }
        iframe { width: 100%; height: 100%; border: none; }

        footer { margin-top: 50px; padding: 20px; text-align: center; font-weight: 600; color: #ccc; }
        .highlight-name { color: #00d2ff; text-shadow: 0 0 10px rgba(0, 210, 255, 0.5); }
        .loader { display: none; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary-color); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- TOOL LOCK SCREEN -->
    <div id="lock-screen">
        <div class="lock-box">
            <i class="fas fa-user-shield"></i>
            <h2>TOOL LOCKED</h2>
            <p>Please follow our WhatsApp Channel to unlock this tool.</p>
            <a href="https://whatsapp.com/channel/0029VbB47ttDDmFNztpnZf2m" target="_blank" class="follow-btn" onclick="startUnlockProcess()">
                <i class="fab fa-whatsapp"></i> FOLLOW TO UNLOCK
            </a>
            <p id="timer-text">Unlocking in <span id="seconds">4</span>s...</p>
        </div>
    </div>

    <div class="banner">
        <h1>Sim Database</h1>
    </div>

    <div class="container">
        <div id="dashboard" class="db-grid">
            <div class="db-card" onclick="openDatabase('pak')">
                <i class="fas fa-flag"></i>
                <h2>PAK SIM DATABASE</h2>
                <p>Live Tracker & CNIC Info</p>
            </div>
            <div class="db-card" onclick="openDatabase('ind')">
                <i class="fas fa-university"></i>
                <h2>INDIAN SIM DATABASE</h2>
                <p>Mobile Number Details</p>
            </div>
        </div>

        <div id="search-section" class="search-section">
            <button class="back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i> Back</button>
            <h2 id="section-title">Database</h2>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Enter Number...">
                <button class="search-btn" onclick="fetchData()">SEARCH DATA</button>
            </div>
            
            <div class="loader" id="loader"></div>

            <div id="result-area" class="result-area">
                <h3 style="color: var(--primary-color); border-bottom: 1px solid; padding-bottom: 10px;">USER INFORMATION</h3>
                <div id="data-content"></div>
                <div id="map-container">
                    <iframe id="map-iframe" src=""></iframe>
                </div>
            </div>
        </div>
    </div>

    <footer>
        DEVELOPER <span class="highlight-name">NAWAB ZADA HACKER</span> 🦅🙌
    </footer>

    <script>
        function startUnlockProcess() {
            document.getElementById('timer-text').style.display = 'block';
            let timeLeft = 4;
            const interval = setInterval(() => {
                timeLeft--;
                document.getElementById('seconds').innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(interval);
                    document.getElementById('lock-screen').style.display = 'none';
                    localStorage.setItem('toolUnlocked', 'true');
                }
            }, 1000);
        }

        window.onload = () => {
            if(localStorage.getItem('toolUnlocked') === 'true') {
                document.getElementById('lock-screen').style.display = 'none';
            }
        };

        let currentDB = '';
        function openDatabase(type) {
            currentDB = type;
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('search-section').style.display = 'block';
            document.getElementById('section-title').innerText = type === 'pak' ? 'PAKISTAN DATABASE' : 'INDIA DATABASE';
            document.getElementById('result-area').style.display = 'none';
        }

        function goBack() {
            document.getElementById('dashboard').style.display = 'grid';
            document.getElementById('search-section').style.display = 'none';
        }

        async function fetchData() {
            const query = document.getElementById('search-input').value;
            const loader = document.getElementById('loader');
            const resultArea = document.getElementById('result-area');
            const dataContent = document.getElementById('data-content');
            const mapContainer = document.getElementById('map-container');

            if (!query) { alert("Please enter a number!"); return; }

            loader.style.display = 'block';
            resultArea.style.display = 'none';
            mapContainer.style.display = 'none';

            let apiUrl = currentDB === 'pak' 
                ? `https://sim-info-api.wasif-ali.workers.dev/?search=${query}`
                : `https://wasifali-indian-number-info.vercel.app/api?number=${query}`;

            try {
                const response = await fetch(apiUrl);
                const json = await response.json();
                loader.style.display = 'none';

                let finalData = {};
                // Filter logic: Agar data kisi inner object mein hai to usko nikaalo
                if (json.data && typeof json.data === 'object') {
                    finalData = json.data;
                } else if (Array.isArray(json.result)) {
                    finalData = json.result[0];
                } else {
                    finalData = json;
                }

                let html = '';
                let mapLocation = '';
                let hasRealData = false;

                // Faltu keys jo humein nahi dikhani
                const blacklist = ['success', 'status', 'count', 'developer', 'telegram', 'channel', 'credit', 'note'];

                for (let key in finalData) {
                    if (typeof finalData[key] !== 'object' && !blacklist.includes(key.toLowerCase())) {
                        hasRealData = true;
                        html += `<div class="data-item">
                                    <span class="data-label">${key.replace(/_/g, ' ')}:</span>
                                    <span>${finalData[key]}</span>
                                 </div>`;
                        
                        // Map ke liye location pick karo
                        if (key.toLowerCase().match(/address|city|location|province/)) {
                            mapLocation += finalData[key] + " ";
                        }
                    }
                }

                if (hasRealData) {
                    dataContent.innerHTML = html;
                    resultArea.style.display = 'block';
                    if (mapLocation.trim() !== "") {
                        mapContainer.style.display = 'block';
                        document.getElementById('map-iframe').src = `https://maps.google.com/maps?q=${encodeURIComponent(mapLocation)}&t=k&z=15&ie=UTF8&iwloc=&output=embed`;
                    }
                } else {
                    alert("No valid data found for this number.");
                }

            } catch (e) {
                loader.style.display = 'none';
                alert("API Error! Please try again later.");
            }
        }
    </script>
</body>
</html>
